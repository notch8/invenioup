# Slim overrides for helm-invenio (friends). Chart defaults apply for anything omitted.
# Data layer: PostgreSQL is external (postgresqlExternal). Redis, RabbitMQ, OpenSearch use bundled subcharts.
#
# Non-secret settings: edit this file in git (hostname, Postgres host, ingress, persistence, etc.).
# Secrets only: use $VAR placeholders; deploy workflow exports them from GitHub Actions secrets before envsubst.
# Helm templates such as {{ include "invenio.hostname" $ }} are unchanged by envsubst.
---
global:
  timezone: "America/Los_Angeles"

# repository + tag are overridden by bin/helm_deploy (--set image.repository / image.tag).
image:
  registry: ghcr.io
  repository: notch8/invenioup
  pullPolicy: IfNotPresent

ingress:
  enabled: true
  class: "nginx-ingress"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-production-dns"

invenio:
  # Set to your public hostname (e.g. rdm.example.com).
  hostname: "invenioup-friends.notch8.cloud"
  init: false
  demo_data: false

nginx:
  image: "nginx:1.24.0"
  max_conns: 100
  assets:
    location: /opt/invenio/var/instance/static
  records:
    client_max_body_size: 100m
  files:
    client_max_body_size: 50G
  # NOTES.txt in chart 0.11.x dereferences .initContainers.resources without a nil guard; empty map avoids a render panic.
  initContainers: {}
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL

web:
  replicas: 2
  terminationGracePeriodSeconds: 60
  uwsgi:
    processes: 6
    threads: 4
  autoscaler:
    enabled: false
    scaler_cpu_utilization: 65
    max_web_replicas: 10
    min_web_replicas: 2
  readinessProbe:
    exec:
      command:
        - /bin/bash
        - -c
        - "uwsgi_curl -X HEAD -H 'Host: {{ include \"invenio.hostname\" $ }}' $(hostname):5000 /ping"
    failureThreshold: 3
    initialDelaySeconds: 5
    periodSeconds: 5
    successThreshold: 1
    timeoutSeconds: 1
  startupProbe:
    exec:
      command:
        - /bin/bash
        - -c
        - "uwsgi_curl -X HEAD -H 'Host: {{ include \"invenio.hostname\" $ }}' $(hostname):5000 /ping"
    failureThreshold: 30
    initialDelaySeconds: 30
    periodSeconds: 10
    successThreshold: 1
    timeoutSeconds: 10
  livenessProbe: null
  assets:
    location: /opt/invenio/var/instance/static
  initContainers:
    resources: {}
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
  service:
    type: ClusterIP
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    seccompProfile:
      type: "RuntimeDefault"
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL

worker:
  app: invenio_app.celery
  concurrency: 2
  log_level: INFO
  replicas: 2
  initContainers: {}
  run_mount_path: /var/run/celery
  celery_pidfile: /var/run/celery/celerybeat.pid
  celery_schedule: /var/run/celery/celery-schedule
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    seccompProfile:
      type: "RuntimeDefault"
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
  livenessProbe:
    exec:
      command:
        - /bin/bash
        - -c
        - "celery -A {{ .Values.worker.app }} inspect ping -d celery@$(hostname)"
    initialDelaySeconds: 20
    timeoutSeconds: 30
  readinessProbe: null
  startupProbe: null

workerBeat:
  initContainers: {}
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    seccompProfile:
      type: "RuntimeDefault"
  livenessProbe:
    exec:
      command:
        - /bin/bash
        - -c
        - "celery -A {{ .Values.worker.app }} inspect ping"
    initialDelaySeconds: 20
    timeoutSeconds: 30
  readinessProbe: null
  startupProbe: null

persistence:
  enabled: true
  name: "shared-volume"
  access_mode: ReadWriteMany
  size: "10G"
  storage_class: "efs-sc"
  useExistingClaim: false

redis:
  enabled: true
  auth:
    enabled: true
    password: "${REDIS_PASSWORD}"
  image:
    repository: bitnamilegacy/redis
  master:
    disableCommands: []
  replica:
    disableCommands: []

rabbitmq:
  enabled: true
  auth:
    password: "${RABBITMQ_PASSWORD}"
  image:
    repository: bitnamilegacy/rabbitmq

flower:
  enabled: false

postgresql:
  enabled: false

postgresqlExternal:
  hostname: "postgres-postgresql.postgres.svc.cluster.local"
  port: 5432
  username: "invenioup-friends"
  database: "invenioup-friends"
  password: "${POSTGRES_PASSWORD}"

opensearch:
  enabled: true
  dashboards:
    image:
      repository: bitnamilegacy/opensearch-dashboards
  image:
    repository: bitnamilegacy/opensearch
  sysctlImage:
    repository: bitnamilegacy/os-shell
