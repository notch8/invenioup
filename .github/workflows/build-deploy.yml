name: Build & Deploy InvenioRDM Demo

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Add helm-invenio repo
        run: |
          helm repo add helm-invenio https://inveniosoftware.github.io/helm-invenio/
          helm repo update

      - name: Deploy to r2-friends
        run: |
          helm upgrade --install inveniordm-demo helm-invenio/invenio \
            -f helm/values.yaml \
            --set image.tag=${{ github.sha }} \
            --set-string rabbitmq.auth.existingPasswordSecret=inveniordm-rabbitmq-credentials \
            --set-string rabbitmq.auth.existingSecretPasswordKey=rabbitmq-password \
            --namespace inveniordm \
            --create-namespace \
            --wait \
            --timeout 10m

      - name: Post-deploy smoke tests
        run: ./scripts/smoke-test.sh ${{ vars.STAGING_URL || 'https://inveniordm-demo.notch8.com' }}
