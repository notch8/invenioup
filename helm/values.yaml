# Helm values overrides for InvenioRDM Demo on r2-friends staging cluster.
#
# Usage:
#   helm repo add helm-invenio https://inveniosoftware.github.io/helm-invenio/
#   helm install inveniordm-demo helm-invenio/invenio \
#     -f helm/values.yaml \
#     -n inveniordm \
#     --create-namespace
---

global:
  timezone: "America/Los_Angeles"

# -- Container image (built by our CI pipeline)
image:
  registry: ghcr.io
  repository: notch8/invenioup
  tag: latest
  pullPolicy: Always
  pullSecrets:
    - name: ghcr-credentials

# -- Ingress
ingress:
  enabled: true
  class: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "50G"
  tlsSecretNameOverride: inveniordm-demo-tls

# -- InvenioRDM application configuration
invenio:
  hostname: "inveniordm-demo.notch8.com"

  # First deploy: set init=true and default_users to bootstrap the instance.
  # After first successful deploy, set init=false.
  init: true
  default_users:
    - email: "admin@notch8.com"
      password: ""  # Set via K8s secret or override at deploy time
      active: true
      confirmed: true

  demo_data: false

  sentry:
    enabled: false

  datacite:
    enabled: false

  # S3 file storage configuration injected as env vars
  extraConfig:
    INVENIO_FILES_REST_STORAGE_FACTORY: "invenio_s3.s3fs_storage_factory"

  extraEnvFrom:
    - secretRef:
        name: inveniordm-s3-credentials
    - secretRef:
        name: inveniordm-app-secrets

# -- Web (uWSGI) pods
web:
  replicas: 1
  uwsgi:
    processes: 2
    threads: 2
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "1"
      memory: 2Gi

# -- Celery worker pods
worker:
  replicas: 1
  concurrency: 2
  log_level: INFO
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "1"
      memory: 2Gi

# -- Celery beat (scheduler)
workerBeat:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# -- Nginx sidecar
nginx:
  image: "nginx:1.24.0"
  max_conns: 100
  records:
    client_max_body_size: 100m
  files:
    client_max_body_size: 50G

# -- Terminal pod for admin tasks
terminal:
  enabled: true
  replicas: 0  # Scale to 1 when needed for admin CLI access

# -- Flower (Celery monitoring)
flower:
  enabled: false  # Enable if you want Celery task monitoring

# -- Persistence (disabled -- using S3 for file storage)
persistence:
  enabled: false

# ============================================================
# Sub-chart dependencies
# ============================================================

# -- PostgreSQL: DISABLED (using existing cluster database)
postgresql:
  enabled: false

# -- External PostgreSQL (existing r2-friends cluster DB)
postgresqlExternal:
  host: ""      # FILL IN: your cluster Postgres host, e.g. postgres.r2-friends.svc.cluster.local
  port: 5432
  username: inveniordm_demo
  database: inveniordm_demo
  existingSecret: inveniordm-db-credentials
  existingSecretPasswordKey: password

# -- Redis: enabled via sub-chart (bitnamilegacy workaround already in chart defaults)
redis:
  enabled: true
  auth:
    enabled: false
  image:
    repository: bitnamilegacy/redis
  master:
    disableCommands: []
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
  replica:
    disableCommands: []

# -- RabbitMQ: enabled via sub-chart (bitnamilegacy workaround already in chart defaults)
rabbitmq:
  enabled: true
  auth:
    password: ""  # Set via K8s secret or override at deploy time
  image:
    repository: bitnamilegacy/rabbitmq
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# -- OpenSearch: enabled via sub-chart (bitnamilegacy workaround already in chart defaults)
opensearch:
  enabled: true
  image:
    repository: bitnamilegacy/opensearch
  dashboards:
    image:
      repository: bitnamilegacy/opensearch-dashboards
  sysctlImage:
    repository: bitnamilegacy/os-shell
  master:
    resources:
      requests:
        cpu: "1"
        memory: 2Gi
      limits:
        cpu: "2"
        memory: 4Gi

# -- Logstash: disabled for demo
logstash:
  enabled: false

# -- Kerberos: not needed
kerberos:
  enabled: false
